name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache pandoc.wasm
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/pandoc.wasm
          key: pandoc-wasm-${{ hashFiles('app/src/main/assets/PANDOC_VERSION.txt') }}

      - name: Download pandoc.wasm
        run: ./gradlew downloadPandocWasm

      - name: Run tests
        run: ./gradlew testDebugUnitTest

      - name: Run lint
        run: ./gradlew lint --continue

      - name: Build debug APK
        run: ./gradlew assembleDebug
