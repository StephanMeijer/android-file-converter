# Required GitHub Secrets:
#   KEYSTORE_BASE64              - base64-encoded upload.keystore file
#   KEYSTORE_PASSWORD            - keystore password
#   KEY_ALIAS                    - key alias (e.g. "upload")
#   KEY_PASSWORD                 - key password
#   PLAY_STORE_SERVICE_ACCOUNT_JSON - Google Play service account JSON (entire content)
#
# IMPORTANT: The FIRST AAB upload must be done manually via the Play Console web UI.
# The Google Play API cannot create a new app listing — it can only update existing ones.
# After the first manual upload, this workflow handles all subsequent releases automatically.
#
# To generate the upload keystore:
#   keytool -genkeypair -v -storetype PKCS12 -keystore upload.keystore -alias upload -keyalg RSA -keysize 2048 -validity 10000
# Then base64 encode: base64 -w 0 upload.keystore | pbcopy (mac) or | xclip (linux)
# Add the output as the KEYSTORE_BASE64 GitHub Secret.

name: Deploy to Play Store

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache pandoc.wasm
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/pandoc.wasm
          key: pandoc-wasm-${{ hashFiles('app/src/main/assets/PANDOC_VERSION.txt') }}

      - name: Download pandoc.wasm
        run: ./gradlew downloadPandocWasm

      - name: Run tests
        run: ./gradlew testDebugUnitTest

      - name: Build release AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.stephanmeijer.fileconverter
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          mappingFile: app/build/outputs/mapping/release/mapping.txt
